# Module 1 baseline. Postgres only.
# Overlays for later modules will live alongside this file.

version: "3.8"
services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    env_file:
      - ../../.env
    deploy:
      replicas: 3
    depends_on:
      - postgres
      - redis
      - influxdb

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortn
      POSTGRES_PASSWORD: shortn
      POSTGRES_DB: shortn
    ports:
      - "5433:5432"
    volumes:
      - shortn_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortn"]
      interval: 5s
      timeout: 3s
      retries: 5
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: shortn
    ports:
      - "5050:80"
    depends_on:
      - postgres
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - influxdb

volumes:
  shortn_pg_data:
